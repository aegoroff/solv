[workspace]

[package]
name = "solp-fuzz"
version = "0.21.0"
authors = ["Automatically generated"]
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

# Enable sanitizers for fuzzing builds.
# To run with ASAN:  RUSTFLAGS="-Zsanitizer=address" cargo +nightly fuzz run parse --sanitizer address
# To run with UBSAN: RUSTFLAGS="-Zsanitizer=undefined" cargo +nightly fuzz run parse
# MSAN also available on Linux: RUSTFLAGS="-Zsanitizer=memory" cargo +nightly fuzz run parse

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.solp]
path = ".."

# Required for the round-trip fuzz target
[dependencies.serde_json]
version = "1"

[dependencies.serde]
version = "1"

[[bin]]
name = "parse"
path = "fuzz_targets/parse.rs"
test = false
doc = false

[[bin]]
name = "roundtrip"
path = "fuzz_targets/roundtrip.rs"
test = false
doc = false